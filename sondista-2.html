<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ICINCO · Parte Diario</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111318;
    --card: #1a1e27;
    --card2: #222736;
    --border: #2e3446;
    --accent: #f0a500;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e8eaf0;
    --muted: #7c8499;
    --fh: 'Barlow Condensed', sans-serif;
    --fb: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: var(--fb); min-height: 100vh; }

  /* Login */
  .login-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
    background: var(--bg);
  }
  .login-logo {
    width: 72px; height: 72px; background: var(--accent);
    clip-path: polygon(0 0,100% 0,100% 75%,75% 100%,0 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--fh); font-size: 28px; font-weight: 800; color: #000;
    margin-bottom: 24px;
  }
  .login-title { font-family: var(--fh); font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 40px; letter-spacing: 0.1em; text-transform: uppercase; }
  .login-box { background: var(--card); border: 1px solid var(--border); padding: 28px; width: 100%; max-width: 360px; }
  .login-box label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; }
  .login-box input { width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; font-family: var(--fb); font-size: 16px; outline: none; margin-bottom: 16px; border-radius: 0; }
  .login-box input:focus { border-color: var(--accent); }
  .login-err { color: var(--red); font-size: 12px; margin-bottom: 12px; display: none; }

  /* App */
  .app { display: none; max-width: 520px; margin: 0 auto; padding: 0 0 80px; }

  .topbar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-logo { width: 36px; height: 36px; background: var(--accent); clip-path: polygon(0 0,100% 0,100% 75%,75% 100%,0 100%); display: flex; align-items: center; justify-content: center; font-family: var(--fh); font-weight: 800; font-size: 14px; color: #000; flex-shrink: 0; }
  .topbar-title { font-family: var(--fh); font-size: 20px; font-weight: 700; flex: 1; }
  .topbar-user { font-size: 11px; color: var(--muted); text-align: right; }
  .topbar-user span { display: block; color: var(--accent); font-weight: 600; font-size: 13px; }

  .section { padding: 20px; border-bottom: 1px solid var(--border); }
  .section-title { font-family: var(--fh); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; width: 3px; height: 14px; background: var(--accent); }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin-bottom: 5px; }
  .field select, .field input { width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; font-family: var(--fb); font-size: 15px; outline: none; appearance: none; -webkit-appearance: none; border-radius: 0; }
  .field select:focus, .field input:focus { border-color: var(--accent); }
  .field textarea { width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 12px 14px; font-family: var(--fb); font-size: 14px; outline: none; resize: none; border-radius: 0; line-height: 1.5; }
  .field textarea:focus { border-color: var(--accent); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--card2); border: 1px solid var(--border); padding: 14px; margin-bottom: 14px; }
  .toggle-label { font-size: 14px; }
  .toggle-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--border); cursor: pointer; transition: .3s; border-radius: 26px; }
  .slider:before { content: ''; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px; background: white; transition: .3s; border-radius: 50%; }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider:before { transform: translateX(22px); background: #000; }

  /* Sondeos */
  .sondeo-card { background: var(--card2); border: 1px solid var(--border); border-left: 3px solid var(--blue); padding: 14px; margin-bottom: 10px; position: relative; }
  .sondeo-card.barrena { border-left-color: var(--accent); }
  .sondeo-card.dpsh { border-left-color: #a855f7; }
  .sondeo-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .sondeo-num { font-family: var(--fh); font-size: 16px; font-weight: 700; color: var(--blue); }
  .sondeo-card.barrena .sondeo-num { color: var(--accent); }
  .sondeo-card.dpsh .sondeo-num { color: #a855f7; }
  .sondeo-tipo-sel { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 4px 10px; font-family: var(--fb); font-size: 12px; outline: none; appearance: none; flex: 1; }
  .sondeo-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 6px; }
  .sondeo-del:hover { color: var(--red); }

  .cotas-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .cota-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); display: block; margin-bottom: 4px; }
  .cota-field input { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 10px; font-family: var(--fb); font-size: 15px; font-weight: 600; outline: none; text-align: center; border-radius: 0; }
  .cota-field input:focus { border-color: var(--accent); }
  .cota-field input[readonly] { color: var(--green); border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.05); }
  .metros-label { font-size: 11px; color: var(--green); text-align: center; margin-top: 4px; font-weight: 600; }

  .add-sondeo-btn { width: 100%; background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 12px; font-family: var(--fb); font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .add-sondeo-btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-submit { width: 100%; background: var(--accent); color: #000; border: none; padding: 16px; font-family: var(--fh); font-size: 20px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
  .btn-submit:hover { background: #ffb800; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; font-family: var(--fb); font-size: 11px; cursor: pointer; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 12px 24px; font-family: var(--fh); font-size: 16px; font-weight: 700; letter-spacing: 0.06em; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.error { background: var(--red); color: #fff; }
  .toast.show { opacity: 1; }

  .spinner-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 500; }
  .spinner-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  select option { background: #1a1e27; }
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-logo">IC</div>
  <div class="login-title">ICINCO</div>
  <div class="login-sub">Portal de sondistas</div>
  <div class="login-box">
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-err" id="login-err">Contraseña incorrecta</div>
    <button class="btn-submit" onclick="doLogin()">Entrar</button>
  </div>
</div>

<!-- App -->
<div class="app" id="app">

  <div class="topbar">
    <div class="topbar-logo">IC</div>
    <div class="topbar-title">Parte Diario</div>
    <div class="topbar-user">
      <span id="topbar-sondista">—</span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <!-- Identificación -->
  <div class="section">
    <div class="section-title">Identificación</div>
    <div class="field-row">
      <div class="field">
        <label>Sondista</label>
        <select id="sel-sondista" onchange="onSondistaChange()">
          <option value="">Seleccionar...</option>
        </select>
      </div>
      <div class="field">
        <label>Ayudante</label>
        <select id="sel-ayudante">
          <option value="">Seleccionar...</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="date" id="inp-fecha">
    </div>
  </div>

  <!-- Obra y máquina -->
  <div class="section">
    <div class="section-title">Obra y equipo</div>
    <div class="field">
      <label>Obra</label>
      <select id="sel-obra" onchange="onObraChange()">
        <option value="">Seleccionar obra...</option>
      </select>
    </div>
    <div class="field">
      <label>Máquina</label>
      <select id="sel-maquina">
        <option value="">Seleccionar...</option>
        <option>RL400a</option>
        <option>RL400b</option>
        <option>AND</option>
        <option>TP-30</option>
        <option>TP-50</option>
      </select>
    </div>
    <div class="toggle-row">
      <div>
        <div class="toggle-label">⚓ Fuera de Tenerife</div>
        <div class="toggle-sub">Marcar si la obra es en otra isla</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="chk-fuera">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <!-- Sondeos -->
  <div class="section">
    <div class="section-title">Sondeos del día</div>
    <div id="sondeos-container"></div>
    <button class="add-sondeo-btn" onclick="addSondeo()">
      + Añadir sondeo / barrena / DPSH
    </button>
  </div>

  <!-- Fotos -->
  <div class="section">
    <div class="section-title">Foto del sondeo</div>
    <div class="field">
      <label>Adjuntar foto (opcional)</label>
      <input type="file" id="inp-foto" accept="image/*" capture="environment" onchange="onFotoChange(this)"
        style="width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-family:var(--fb);font-size:13px;cursor:pointer;">
    </div>
    <div id="foto-preview" style="display:none;margin-top:10px;">
      <img id="foto-img" style="width:100%;max-height:200px;object-fit:cover;border:1px solid var(--border);">
      <button onclick="clearFoto()" style="margin-top:6px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;font-family:var(--fb);font-size:11px;cursor:pointer;width:100%;">✕ Quitar foto</button>
    </div>
  </div>

  <!-- Incidencias -->
  <div class="section">
    <div class="section-title">Incidencias</div>
    <div class="field">
      <textarea id="txt-incidencias" rows="3" placeholder="Observaciones, problemas, detalles del día... (opcional)"></textarea>
    </div>
  </div>

  <!-- Enviar -->
  <div class="section" style="border-bottom:none">
    <button class="btn-submit" id="btn-submit" onclick="enviarParte()">
      Enviar parte del día
    </button>
  </div>

</div>

<div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzfNGxUvOPMd2q6EVSFIPUa1FzFwBJnrlWrg_gf43QYU0CikURfFcHE-I8f-TWuMnoAKQ/exec';
const PASS = 'sondista2026';

let config = { obras: [], sondistas: [], ayudantes: [] };
let sondeoCount = 0;

// ── Auth ──────────────────────────────────────────────────────────────
function doLogin() {
  const p = document.getElementById('login-pass').value;
  if (p === PASS) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    localStorage.setItem('ic_auth', '1');
    initApp();
  } else {
    document.getElementById('login-err').style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('ic_auth');
  location.reload();
}

// ── Init ──────────────────────────────────────────────────────────────
async function initApp() {
  // Fecha de hoy por defecto
  document.getElementById('inp-fecha').value = new Date().toISOString().split('T')[0];

  showSpinner(true);
  try {
    const res = await fetch(`${API_URL}?action=getConfig`);
    config = await res.json();
    populateSelects();
  } catch(e) {
    showToast('Error cargando configuración', true);
  } finally {
    showSpinner(false);
  }
}

function populateSelects() {
  const ss = document.getElementById('sel-sondista');
  config.sondistas.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; ss.appendChild(o); });

  const sa = document.getElementById('sel-ayudante');
  config.ayudantes.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; sa.appendChild(o); });

  const so = document.getElementById('sel-obra');
  config.obras.forEach(ob => { const o = document.createElement('option'); o.value = ob; o.textContent = ob; so.appendChild(o); });
}

function onSondistaChange() {
  const s = document.getElementById('sel-sondista').value;
  document.getElementById('topbar-sondista').textContent = s || '—';
}

function onObraChange() {
  // Cuando cambia la obra, actualizamos cotas de sondeos existentes
  document.querySelectorAll('.sondeo-card').forEach(card => {
    const sondeoNombre = card.querySelector('.sondeo-nombre-inp')?.value;
    if (sondeoNombre) loadCota(card, sondeoNombre);
  });
}

// ── Sondeos ───────────────────────────────────────────────────────────
function addSondeo() {
  sondeoCount++;
  const container = document.getElementById('sondeos-container');
  const div = document.createElement('div');
  div.className = 'sondeo-card';
  div.dataset.id = sondeoCount;
  div.innerHTML = `
    <button class="sondeo-del" onclick="delSondeo(this)">×</button>
    <div class="sondeo-header">
      <span class="sondeo-num">S${sondeoCount}</span>
      <input class="sondeo-nombre-inp" type="text" placeholder="Nombre (S1, S2...)" value="S${sondeoCount}"
        style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;font-family:var(--fb);font-size:14px;outline:none;flex:1;"
        onchange="onNombreChange(this)" onblur="onNombreChange(this)">
      <select class="sondeo-tipo-sel" onchange="onTipoChange(this)">
        <option value="sondeo">Sondeo rotativo</option>
        <option value="barrena">Barrena</option>
        <option value="dpsh">DPSH</option>
      </select>
    </div>
    <div class="cotas-row">
      <div class="cota-field">
        <label>Cota inicio (m)</label>
        <input type="number" step="0.5" min="0" class="inp-inicio" value="0" readonly>
        <div class="metros-label" style="color:var(--muted);font-size:10px;">Auto</div>
      </div>
      <div class="cota-field">
        <label>Cota final (m)</label>
        <input type="number" step="0.5" min="0" class="inp-final" placeholder="0" oninput="calcMetros(this)">
      </div>
      <div class="cota-field">
        <label>Metros día</label>
        <input type="number" class="inp-metros" readonly placeholder="—">
        <div class="metros-label" id="metros-lbl-${sondeoCount}">0 m</div>
      </div>
    </div>
  `;
  container.appendChild(div);

  // Cargar cota automáticamente
  loadCota(div, `S${sondeoCount}`);
}

function delSondeo(btn) {
  btn.closest('.sondeo-card').remove();
}

function onTipoChange(sel) {
  const card = sel.closest('.sondeo-card');
  card.className = 'sondeo-card ' + sel.value;
  card.querySelector('.sondeo-num').style.color = sel.value === 'barrena' ? 'var(--accent)' : sel.value === 'dpsh' ? '#a855f7' : 'var(--blue)';
}

async function onNombreChange(inp) {
  const card = inp.closest('.sondeo-card');
  const num = inp.closest('.sondeo-header').querySelector('.sondeo-num');
  num.textContent = inp.value || '?';
  loadCota(card, inp.value);
}

async function loadCota(card, sondeoNombre) {
  const sondista = document.getElementById('sel-sondista').value;
  const obra = document.getElementById('sel-obra').value;
  if (!sondista || !obra || !sondeoNombre) return;

  try {
    const res = await fetch(`${API_URL}?action=getCotas&sondista=${encodeURIComponent(sondista)}&obra=${encodeURIComponent(obra)}&sondeo=${encodeURIComponent(sondeoNombre)}`);
    const data = await res.json();
    const cotaFinal = parseFloat(data.cotaFinal) || 0;
    card.querySelector('.inp-inicio').value = cotaFinal;
    calcMetros(card.querySelector('.inp-final'));
  } catch(e) {}
}

function calcMetros(inpFinal) {
  const card = inpFinal.closest('.sondeo-card');
  const inicio = parseFloat(card.querySelector('.inp-inicio').value) || 0;
  const final = parseFloat(inpFinal.value) || 0;
  const metros = Math.max(0, final - inicio);
  card.querySelector('.inp-metros').value = metros > 0 ? metros : '';
  const lbl = card.querySelector('[id^="metros-lbl"]');
  if (lbl) lbl.textContent = metros > 0 ? `${metros} m` : '0 m';
}

// ── Foto por sondeo ──────────────────────────────────────────────────
function comprimirImagen(file, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 1200;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.75);
      callback(compressed);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function onFotoSondeo(inp) {
  const file = inp.files[0];
  if (!file) return;
  comprimirImagen(file, compressed => {
    inp.dataset.base64 = compressed.split(',')[1];
    inp.dataset.filename = file.name.replace(/[^a-zA-Z0-9._-]/g, '_').replace(/\.[^.]*$/, '') + '.jpg';
    const preview = inp.closest('.foto-field').querySelector('.foto-preview-sondeo');
    const imgEl = inp.closest('.foto-field').querySelector('.foto-img-sondeo');
    imgEl.src = compressed;
    preview.style.display = 'block';
  });
}

function clearFotoSondeo(btn) {
  const field = btn.closest('.foto-field');
  const inp = field.querySelector('.inp-foto-sondeo');
  inp.value = '';
  inp.dataset.base64 = '';
  inp.dataset.filename = '';
  field.querySelector('.foto-preview-sondeo').style.display = 'none';
  field.querySelector('.foto-img-sondeo').src = '';
}

// ── Enviar ────────────────────────────────────────────────────────────
async function enviarParte() {
  const sondista = document.getElementById('sel-sondista').value;
  const ayudante = document.getElementById('sel-ayudante').value;
  const fecha    = document.getElementById('inp-fecha').value;
  const obra     = document.getElementById('sel-obra').value;
  const maquina  = document.getElementById('sel-maquina').value;
  const fueraTfe = document.getElementById('chk-fuera').checked;
  const incidencias = document.getElementById('txt-incidencias').value.trim();

  if (!sondista) { showToast('Selecciona tu nombre', true); return; }
  if (!fecha)    { showToast('Indica la fecha', true); return; }
  if (!obra)     { showToast('Selecciona la obra', true); return; }

  const sondeoCards = document.querySelectorAll('.sondeo-card');
  const sondeos = [];
  for (const card of sondeoCards) {
    const nombre = card.querySelector('.sondeo-nombre-inp').value.trim();
    const tipo   = card.querySelector('.sondeo-tipo-sel').value;
    const cotaInicio = parseFloat(card.querySelector('.inp-inicio').value) || 0;
    const cotaFinal  = parseFloat(card.querySelector('.inp-final').value);
    if (!nombre || isNaN(cotaFinal)) { showToast('Revisa las cotas de los sondeos', true); return; }
    if (cotaFinal < cotaInicio) { showToast(`Cota final de ${nombre} menor que inicio`, true); return; }
    sondeos.push({ nombre, tipo, cotaInicio, cotaFinal });
  }

  if (sondeos.length === 0 && !incidencias) {
    showToast('Añade al menos un sondeo o una incidencia', true); return;
  }

  showSpinner(true);
  document.getElementById('btn-submit').disabled = true;

  try {
    // 1. Subir fotos por sondeo si las hay
    for (const s of sondeos) {
      const card = [...document.querySelectorAll('.sondeo-card')].find(c => {
        return c.querySelector('.sondeo-nombre-inp')?.value === s.nombre &&
               c.querySelector('.sondeo-tipo-sel')?.value === s.tipo;
      });
      if (!card) continue;
      const inpFoto = card.querySelector('.inp-foto-sondeo');
      if (!inpFoto || !inpFoto.dataset.base64) continue;
      showToast('Subiendo foto de ' + s.nombre + '...', false);
      try {
        const fotoRes = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'uploadFoto', base64: inpFoto.dataset.base64, fileName: s.nombre + '_' + inpFoto.dataset.filename, obra, fecha })
        });
        const fotoData = await fotoRes.json();
        if (fotoData.ok) s.fotoUrl = fotoData.url;
      } catch(e) {}
    }

    // 2. Enviar parte
    const body = { fecha, sondista, ayudante, obra, maquina, fueraTfe, incidencias, sondeos };
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.ok) {
      showToast('✅ Parte enviado correctamente');
      resetForm();
    } else {
      showToast('Error al enviar: ' + (data.error||''), true);
    }
  } catch(e) {
    showToast('Error de conexión', true);
  } finally {
    showSpinner(false);
    document.getElementById('btn-submit').disabled = false;
  }
}

function resetForm() {
  document.getElementById('sel-obra').value = '';
  document.getElementById('sel-maquina').value = '';
  document.getElementById('chk-fuera').checked = false;
  document.getElementById('txt-incidencias').value = '';
  document.getElementById('sondeos-container').innerHTML = '';
  sondeoCount = 0;
  document.getElementById('inp-fecha').value = new Date().toISOString().split('T')[0];
  // fotos se limpian al limpiar los sondeos
}

// ── Utils ─────────────────────────────────────────────────────────────
function showSpinner(s) { document.getElementById('spinner').classList.toggle('show', s); }

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err?' error':'') + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}

// Auto-login
if (localStorage.getItem('ic_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}
</script>
</body>
</html>
