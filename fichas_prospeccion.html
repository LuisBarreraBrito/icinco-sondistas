<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fichas de Prospección — ICINCO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #0d1117; --card: #161b24; --card2: #1e2535;
  --border: #2a3347; --accent: #f0a500; --green: #22c55e;
  --red: #ef4444; --text: #e8eaf0; --muted: #6b7a99;
  --fh: 'Barlow Condensed', sans-serif; --fb: 'Barlow', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--fb); font-size: 13px; min-height: 100vh; }

/* Layout */
.layout { display: grid; grid-template-columns: 340px 1fr; min-height: 100vh; }

/* Panel formulario */
.panel-form {
  background: var(--card); border-right: 1px solid var(--border);
  padding: 16px; overflow-y: auto; max-height: 100vh;
}
.panel-preview {
  background: #1a1f2e; display: flex; flex-direction: column;
  align-items: center; padding: 12px 8px; overflow-y: auto; gap: 8px;
  align-items: center; padding: 12px 8px; overflow-y: auto; gap: 8px;
}

/* Cabecera del panel */
.panel-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px; margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.panel-header img { height: 36px; object-fit: contain; }
.panel-header span { font-family: var(--fh); font-size: 15px; font-weight: 700; color: var(--accent); }

/* Secciones */
.sec-title {
  background: var(--card2); color: var(--accent);
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase; padding: 5px 8px;
  margin: 12px -16px 10px -16px;
}
.sec-title:first-of-type { margin-top: 4px; }

/* Campos */
.campo { margin-bottom: 8px; }
.campo label {
  display: block; font-size: 10px; font-weight: 600;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: 0.4px; margin-bottom: 3px;
}
.campo input, .campo select, .campo textarea {
  width: 100%; padding: 6px 8px;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text); font-family: var(--fb); font-size: 12px;
  border-radius: 3px; outline: none; transition: border-color 0.15s;
}
.campo input:focus, .campo select:focus, .campo textarea:focus {
  border-color: var(--accent);
}
.campo textarea { resize: vertical; min-height: 48px; }
.campo select option { background: var(--card2); }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* Coords destacadas */
.coords-box {
  background: rgba(240,165,0,0.07); border: 1px solid rgba(240,165,0,0.3);
  border-radius: 4px; padding: 8px 10px; margin-bottom: 8px;
}
.coords-box .coords-label {
  font-size: 10px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px;
}

/* Toggle SI/NO */
.toggle-group { display: flex; gap: 4px; }
.toggle-btn {
  flex: 1; padding: 6px 4px; border: 1px solid var(--border);
  background: var(--card2); color: var(--muted); border-radius: 3px;
  cursor: pointer; text-align: center; font-size: 11px; font-weight: 700;
  transition: all 0.15s;
}
.toggle-btn.si.activo { background: rgba(34,197,94,0.1); border-color: var(--green); color: var(--green); }
.toggle-btn.no.activo { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red); }

/* Tipo selector */
.tipo-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 4px; }
.tipo-btn {
  padding: 8px 6px; border: 2px solid var(--border);
  background: var(--card2); border-radius: 4px; cursor: pointer;
  text-align: center; font-size: 11px; font-weight: 600; color: var(--muted);
  transition: all 0.2s; line-height: 1.3;
}
.tipo-btn.activo { border-color: var(--accent); background: rgba(240,165,0,0.08); color: var(--text); }
.tipo-btn .ico { font-size: 18px; display: block; margin-bottom: 3px; }

/* Botones */
.btn-primary {
  width: 100%; padding: 11px; background: var(--accent); border: none;
  border-radius: 4px; font-size: 13px; font-weight: 700; color: #000;
  cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.btn-primary:hover { background: #ffb800; }
.btn-secondary {
  width: 100%; padding: 8px; background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  font-size: 12px; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: all 0.15s; margin-top: 6px;
}
.btn-secondary:hover { border-color: var(--muted); }

/* Preview label */
.preview-label {
  font-size: 10px; font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted); align-self: flex-start;
}

/* Nota mapa */
.nota-mapa {
  padding: 8px 14px; border-radius: 4px; font-size: 11px; font-weight: 600;
  text-align: center; width: 100%;
}
.nota-mapa.info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }
.nota-mapa.ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }

/* FICHA (blanco para imprimir) */
.ficha {
  background: #fff;
  width: 100%;
  max-width: 1100px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  font-family: Arial, sans-serif; font-size: 12px; color: #000;
}
.f-header { display: grid; grid-template-columns: 180px 1fr; border-bottom: 2px solid #000; }
.f-logo { padding: 6px 8px; border-right: 1px solid #000; display:flex; align-items:center; }
.f-logo img { height: 50px; object-fit: contain; }
.f-titulo { display:flex; align-items:center; justify-content:center; padding: 8px; }
.f-titulo h2 { font-size: 17px; font-weight: 700; letter-spacing: 2px; }

.f-row { display: grid; border-bottom: 1px solid #000; }
.f-cell { padding: 3px 6px; border-right: 1px solid #ccc; font-size: 10px; }
.f-cell:last-child { border-right: none; }
.f-cell b { font-size: 9px; color: #555; display:block; }

.f-secbar {
  background: #d8d8d8; padding: 3px 8px; font-weight: 700;
  font-size: 10px; letter-spacing: 0.5px;
  border-top: 1px solid #999; border-bottom: 1px solid #999;
}

.f-mapa-area { display: grid; grid-template-columns: 1fr 160px; border-bottom: 1px solid #000; min-height: 170px; }
.f-mapa { border-right: 1px solid #000; overflow: hidden; }
.f-mapa-placeholder {
  width:100%; height:100%; background:#e8e8e8;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:4px; color:#888; font-size:10px; text-align:center;
}
.f-ubic { padding: 8px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.f-ubic-label { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; }
.f-ubic-url {
  font-size: 8px; color: #1a5fa8; text-align:center;
  word-break: break-all; max-width: 140px;
}
.f-ubic-coords { font-size: 8px; color: #555; text-align: center; }

.f-pros-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-top: 1px solid #000; }
.f-pros-col { border-right: 1px solid #000; }
.f-pros-col:last-child { border-right: none; }
.f-pros-header {
  background: #d8d8d8; text-align: center; padding: 3px;
  font-weight: 700; font-size: 11px; border-bottom: 1px solid #999;
}
.f-pros-row { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #eee; }
.f-pros-row:last-child { border-bottom: none; }
.f-pros-cell { padding: 2px 5px; font-size: 10px; border-right: 1px solid #eee; }
.f-pros-cell:last-child { border-right: none; }
.f-pros-cell.lbl { font-weight: 700; color: #444; }
.f-pros-cell.rojo { color: #c0392b; font-weight: 700; }
.f-pros-cell.verde { color: #27ae60; font-weight: 700; }

/* Tipo 2 coords */
.f-coords-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-bottom: 1px solid #ccc; }

.hidden { display: none !important; }

@media (max-width: 800px) {
  .layout { grid-template-columns: 1fr; }
  .panel-form { max-height: none; }
}
</style>
</head>

// ── Tipo ──
function setTipo(n, btn) {
  tipoActivo = n;
  document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  document.getElementById('bloque-t1').classList.toggle('hidden', n !== 1);
  document.getElementById('bloque-t2').classList.toggle('hidden', n !== 2);
  preview();
}

// ── Toggle SI/NO ──
function tog(btn, id, val) {
  const g = btn.closest('.toggle-group');
  g.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  document.getElementById(id).value = val;
  preview();
}

// ── Leer campo ──
function v(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }

// ── Coords ──
function onCoordsChange() {
  clearTimeout(coordTimer);
  coordTimer = setTimeout(() => {
    const lat = parseFloat(v('lat')), lon = parseFloat(v('lon'));
    if (!isNaN(lat) && !isNaN(lon)) {
      if (lat !== ultimaLat || lon !== ultimaLon) {
        ultimaLat = lat; ultimaLon = lon;
        initMap(lat, lon);
        actualizarNotaMapa();
      }
    } else {
      if (leafletMap) { leafletMap.remove(); leafletMap = null; leafletMarker = null; }
      ultimaLat = null; ultimaLon = null;
      actualizarNotaMapa();
    }
    preview();
  }, 900);
}

function initMap(lat, lon) {
  const el = document.getElementById('leaflet-map');
  if (!el) return;
  if (leafletMap) {
    leafletMap.setView([lat, lon], 17);
    if (leafletMarker) leafletMarker.setLatLng([lat, lon]);
    return;
  }
  leafletMap = L.map('leaflet-map', {zoomControl:true, attributionControl:false}).setView([lat, lon], 16);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {maxZoom:19}).addTo(leafletMap);
  leafletMarker = L.marker([lat, lon]).addTo(leafletMap);
}

function actualizarNotaMapa() {
  const el = document.getElementById('nota-mapa');
  if (ultimaLat && ultimaLon) {
    const url = `https://maps.google.com/?q=${ultimaLat},${ultimaLon}`;
    el.className = 'nota-mapa ok';
    el.innerHTML = `✅ Ortofoto cargada · <a href="${url}" target="_blank" style="color:inherit;">Abrir en Google Maps</a>`;
  } else {
    el.className = 'nota-mapa info';
    el.innerHTML = '📍 Introduce latitud y longitud para cargar la ortofoto';
  }
}

function preview() {
  const d = getDatos();
  const mapsUrl = (ultimaLat && ultimaLon) ? `https://maps.google.com/?q=${ultimaLat},${ultimaLon}` : '';
  const fechaFmt = d.fecha ? new Date(d.fecha+'T00:00:00').toLocaleDateString('es-ES') : '';

  let html = `<div style="border:1px solid #000;">`;

  // Cabecera
  html += `
  <div class="f-header">
    <div class="f-logo"><img src="${LOGO_B64}" alt="ICINCO"></div>
    <div class="f-titulo"><h2>PROSPECCIONES DE CAMPO</h2></div>

  <div class="f-row" style="grid-template-columns:auto 120px auto 1fr;border-bottom:1px solid #000;">

    <div class="f-cell" style="border-right:1px solid #000;">${d.nObra}</div>
    <div class="f-cell" style="border-right:1px solid #000;white-space:nowrap;"><b>Nombre:</b></div>

  if (tipoActivo === 1) {
    html += `
    <div class="f-secbar">DATOS PROSPECCIÓN</div>
    <div style="display:grid;grid-template-columns:auto auto 1fr 1fr;border-bottom:1px solid #000;">
      <div class="f-cell" style="border-right:1px solid #ccc;">
        <b>Pers Con</b>${d.contacto}<br><b style="margin-top:4px;display:block;">Nº cont</b>${d.telefono}
      </div>
      <div class="f-cell" style="border-right:1px solid #ccc;"><b>Ubicación</b>${d.direccion}</div>
      <div class="f-cell" style="grid-column:3/5;"><b>Acceso</b>${d.acceso}</div>
    </div>
    <div class="f-secbar">DETALLES DE SITUACIÓN</div>
    <div class="f-mapa-area">
      <div class="f-mapa">
        <div id="leaflet-map" style="width:100%;height:100%;min-height:170px;"></div>
      </div>
      <div class="f-ubic">
        <div class="f-ubic-label">UBICACIÓN</div>
        ${mapsUrl
          ? `<a href="${mapsUrl}" target="_blank" class="f-ubic-url">${mapsUrl}</a>`
          : `<div class="f-ubic-url" style="color:#aaa;">Introduce coordenadas</div>`
        }
        ${ultimaLat ? `<div class="f-ubic-coords">📍 ${ultimaLat}, ${ultimaLon}</div>` : ''}
      </div>
    </div>
    <div class="f-pros-grid">
      <div class="f-pros-col">
        <div class="f-pros-header">Sondeos:</div>
        ${[
          ['Nº y prof.', d.nSond && d.profSond ? `${d.nSond}S × ${d.profSond}m` : '-'],
          ['PVC', d.pvc||'-', d.pvc],
          ['Tapa', d.tapa||'-', d.tapa],
          ['SPT', d.spt||'-'],
          ['MI', d.mi||'-'],
          ['TP', d.tp||'-'],
          ['Coment.', d.otro||'-'],
          ['Agua', d.agua||'-', d.agua==='ICINCO'?'SI':d.agua==='CLIENTE'?'NO':null],
        ].map(([l,val,tog]) => {
          const cls = tog==='NO' ? 'rojo' : tog==='SI' ? 'verde' : '';
          return `<div class="f-pros-row"><div class="f-pros-cell lbl">${l}</div><div class="f-pros-cell ${cls}"> ${val}</div></div>`;
        }).join('')}
      </div>
      <div class="f-pros-col">
        <div class="f-pros-header">DPSH</div>
        <div class="f-pros-row"><div class="f-pros-cell lbl">Nº</div><div class="f-pros-cell">${d.nDpsh||'-'}</div></div>
        <div class="f-pros-row"><div class="f-pros-cell lbl">Prof. max</div><div class="f-pros-cell">${d.profDpsh ? d.profDpsh+'m' : '-'}</div></div>
      </div>
      <div class="f-pros-col">
        <div class="f-pros-header">Barrenas</div>
        <div class="f-pros-row"><div class="f-pros-cell lbl">Nº</div><div class="f-pros-cell">${d.nBarr||'-'}</div></div>
        <div class="f-pros-row"><div class="f-pros-cell lbl">Prof.</div><div class="f-pros-cell">${d.profBarr ? d.profBarr+'m' : '-'}</div></div>
      </div>
    </div>`;
  } else {
    html += `
    <div class="f-secbar">DATOS PROSPECCIÓN</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:1px solid #ccc;">
      <div class="f-cell" style="border-right:1px solid #ccc;">
        <b>Tipo</b>${d.t2tipo}<br><b style="margin-top:4px;display:block;">Código</b>${d.t2cod}
      </div>
      <div class="f-cell" style="border-right:1px solid #ccc;">
        <b>Coordenadas</b>
        <div style="margin-top:3px;font-size:10px;">
          X: ${d.t2x||'-'}<br>Y: ${d.t2y||'-'}<br>Z: ${d.t2z||'-'}<br>PK: ${d.t2pk||'-'}
        </div>
      </div>
      <div class="f-cell">
        <b>Contacto</b>${d.contacto}<br><b style="margin-top:4px;display:block;">Tel.</b>${d.telefono}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #ccc;">
      <div class="f-cell" style="border-right:1px solid #ccc;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:2px;">
          <div><b>Prof.</b>${d.t2prof ? d.t2prof+'m' : '-'}</div>
          <div><b>Agua</b><span class="${d.t2agua==='NO'?'rojo':'verde'}">${d.t2agua}</span></div>
          <div><b>PVC</b><span class="${d.t2pvc==='NO'?'rojo':'verde'}">${d.t2pvc}</span></div>
          <div><b>Tapa</b><span class="${d.t2tapa==='NO'?'rojo':'verde'}">${d.t2tapa}</span></div>
        </div>
      </div>
      <div class="f-cell"><b>Ensayos de campo</b><div style="margin-top:3px;">${d.t2ensayos||'-'}</div></div>
    </div>
    <div class="f-secbar">DETALLES DE SITUACIÓN</div>
    <div class="f-mapa-area" style="grid-template-columns:1fr 140px;">
      <div class="f-mapa">
        <div id="leaflet-map" style="width:100%;height:100%;min-height:170px;"></div>
      </div>
      <div class="f-ubic">
        <div class="f-ubic-label">CÓDIGO QR</div>
        ${mapsUrl
          ? `<a href="${mapsUrl}" target="_blank" class="f-ubic-url">${mapsUrl}</a>`
          : `<div class="f-ubic-url" style="color:#aaa;">Sin coordenadas</div>`
        }
        <div style="padding:4px 6px;font-size:9px;color:#555;text-align:center;">Acceso: ${d.acceso||'-'}</div>
      </div>
    </div>`;
  }

  html += `</div>`;
  document.getElementById('ficha-preview').innerHTML = html;

  // Restaurar mapa Leaflet tras regenerar innerHTML
  leafletMap = null; leafletMarker = null;
  if (ultimaLat && ultimaLon) {
    setTimeout(() => initMap(ultimaLat, ultimaLon), 50);
  }
}

// ── Leer todos los datos ──
function getDatos() {
  return {
    nObra: v('nObra'), fecha: v('fecha'), nombre: v('nombre'),
    direccion: v('direccion'), contacto: v('contacto'), telefono: v('telefono'),

    // T1

    pvc: document.getElementById('pvc').value,

// ══════════════════════════════════════════
// GENERAR PDF
// ══════════════════════════════════════════
async function generarPDF() {
  const { jsPDF } = window.jspdf;
  const d = getDatos();
  const doc = new jsPDF({orientation:'landscape', unit:'mm', format:'a4'});
  const W=297, H=210, mg=8, fw=W-2*mg;

  const negro=[0,0,0], gris=[216,216,216], blanco=[255,255,255];
  const rojo=[192,57,43], verde=[39,174,96];

  const R = (x,y,w,h,fill,stroke) => {
    if(fill){doc.setFillColor(...fill);doc.rect(x,y,w,h,'F');}
    if(stroke){doc.setDrawColor(...stroke);doc.rect(x,y,w,h,'S');}
  };
  const T = (text,x,y,sz,bold,color,align) => {
    doc.setFontSize(sz); doc.setFont('helvetica', bold?'bold':'normal');
    doc.setTextColor(...(color||negro));
    doc.text(String(text||''),x,y,{align:align||'left'});
  };
  const L = (x1,y1,x2,y2) => {doc.setDrawColor(...negro);doc.line(x1,y1,x2,y2);};

  let y = mg;
  const hdr = 18;
  R(mg,y,fw,hdr,blanco,negro);
  // Logo
  R(mg,y,50,hdr,blanco,negro);
  try{doc.addImage(LOGO_B64,'PNG',mg+1,y+0.5,48,hdr-1);}catch(e){T('ICINCO',mg+5,y+9,12,true);}
  T('PROSPECCIONES DE CAMPO', mg+fw/2, y+11, 18, true, negro, 'center');
  y += hdr;

  // Obra
  R(mg,y,fw,8,blanco,negro);
  T('Nº Obra',mg+2,y+5.5,8,true); R(mg+18,y,28,8,blanco,negro); T(d.nObra,mg+20,y+5.5,9);
  L(mg+46,y,mg+46,y+8); T('Nombre:',mg+48,y+5.5,8,true); T(d.nombre,mg+65,y+5.5,9);
  y += 8;

  if(tipoActivo===1) {
    // Datos prospección
    R(mg,y,fw,6,gris,negro); T('DATOS PROSPECCIÓN',mg+3,y+4.3,8,true); y+=6;
    const hD=16; R(mg,y,fw,hD,blanco,negro);
    T('Pers Con',mg+2,y+4,7,true); T(d.contacto,mg+2,y+9,8);
    T('Nº cont',mg+2,y+13,7,true); T(d.telefono,mg+2,y+18,8);
    L(mg+55,y,mg+55,y+hD);
    T('Ubicación',mg+57,y+4,7,true);
    const splitDir=doc.splitTextToSize(d.direccion,80);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...negro);
    doc.text(splitDir,mg+57,y+9);
    L(mg+145,y,mg+145,y+hD);
    T('Acceso',mg+147,y+4,7,true);
    const splitAcc=doc.splitTextToSize(d.acceso,fw-145-5);
    doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(splitAcc,mg+147,y+9);
    y+=hD;

    // Situación
    R(mg,y,fw,6,gris,negro); T('DETALLES DE SITUACIÓN',mg+3,y+4.3,8,true); y+=6;
    const hSit=72, ancQR=52;
    R(mg,y,fw-ancQR,hSit,[230,230,230],negro);
    R(mg+fw-ancQR,y,ancQR,hSit,blanco,negro);

    // Mapa
    if(ultimaLat && ultimaLon) {
      try {
        const imgData = await capturarMapa();
        if(imgData) doc.addImage(imgData,'JPEG',mg+1,y+1,fw-ancQR-2,hSit-2);
        else T('Ortofoto no disponible',mg+(fw-ancQR)/2,y+hSit/2,8,false,[150,150,150],'center');
      } catch(e) { T('Sin imagen',mg+(fw-ancQR)/2,y+hSit/2,8,false,[150,150,150],'center'); }
    } else { T('Sin coordenadas',mg+(fw-ancQR)/2,y+hSit/2,8,false,[150,150,150],'center'); }

    T('UBICACIÓN',mg+fw-ancQR+ancQR/2,y+8,7,true,negro,'center');
    const mUrl = ultimaLat?`maps.google.com/?q=${ultimaLat},${ultimaLon}`:'';
    doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(26,95,168);
    if(mUrl) {const su=doc.splitTextToSize(mUrl,ancQR-6);doc.text(su,mg+fw-ancQR+3,y+16);}
    doc.setTextColor(...negro);
    if(ultimaLat) T(`${ultimaLat}, ${ultimaLon}`,mg+fw-ancQR+ancQR/2,y+hSit-4,6,false,[80,80,80],'center');
    y+=hSit;

    // Tabla prospecciones
    const cW=fw/3, hCab=7, hF=6;
    ['Sondeos:','DPSH','Barrenas'].forEach((lbl,i)=>{
      R(mg+i*cW,y,cW,hCab,gris,negro);
      T(lbl,mg+i*cW+cW/2,y+5,9,true,negro,'center');
    });
    y+=hCab;

    const filasSond=[
      ['Nº y prof.', d.nSond&&d.profSond?`${d.nSond}S × ${d.profSond}m`:'-'],
      ['PVC',d.pvc,d.pvc],['Tapa',d.tapa,d.tapa],
      ['SPT',d.spt||'-'],['MI',d.mi],['TP',d.tp],['Otro',d.otro],
      ['Agua',d.agua,d.agua],
    ];
    const y0=y;
    filasSond.forEach(([lbl,val,tog],i)=>{
      R(mg,y,cW,hF,i%2?[248,248,248]:blanco,negro);
      T(lbl,mg+2,y+4.3,7,true);
      const col=tog==='NO'?rojo:tog==='SI'?verde:negro;
      T(val,mg+cW/2+2,y+4.3,8,tog==='NO'||tog==='SI',col);
      y+=hF;
    });
    [['Nº',d.nDpsh||'-'],['Prof. max',d.profDpsh?d.profDpsh+'m':'-']].forEach(([l,v],i)=>{
      R(mg+cW,y0+i*hF,cW,hF,i%2?[248,248,248]:blanco,negro);
      T(l,mg+cW+2,y0+i*hF+4.3,7,true); T(v,mg+cW*1.5+2,y0+i*hF+4.3,8);
    });
    [['Nº',d.nBarr||'-'],['Prof.',d.profBarr?d.profBarr+'m':'-']].forEach(([l,v],i)=>{
      R(mg+cW*2,y0+i*hF,cW,hF,i%2?[248,248,248]:blanco,negro);
      T(l,mg+cW*2+2,y0+i*hF+4.3,7,true); T(v,mg+cW*2.5+2,y0+i*hF+4.3,8);
    });

  } else {
    // Tipo 2
    R(mg,y,fw,6,gris,negro); T('DATOS PROSPECCIÓN',mg+3,y+4.3,8,true); y+=6;
    const hF1=22; R(mg,y,fw,hF1,blanco,negro);
    T('Tipo',mg+2,y+4,7,true); T(d.t2tipo,mg+2,y+9,9);
    T('Código',mg+2,y+14,7,true); T(d.t2cod,mg+2,y+19,9);
    L(mg+55,y,mg+55,y+hF1);
    T('Coordenadas',mg+57,y+4,7,true);
    [`X: ${d.t2x||'-'}`,`Y: ${d.t2y||'-'}`,`Z: ${d.t2z||'-'}`,`PK: ${d.t2pk||'-'}`]
      .forEach((l,i)=>{doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...negro);doc.text(l,mg+57,y+9+i*3.5);});
    L(mg+130,y,mg+130,y+hF1);
    T('Contacto',mg+132,y+4,7,true); T(d.contacto,mg+132,y+9,8);
    T('Tel.',mg+132,y+14,7,true); T(d.telefono,mg+132,y+19,8);
    L(mg+190,y,mg+190,y+hF1);
    T('Acceso',mg+192,y+4,7,true);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...negro);
    doc.text(doc.splitTextToSize(d.acceso,fw-192-3),mg+192,y+9);
    y+=hF1;

    const hF2=18; R(mg,y,fw,hF2,blanco,negro);
    T('Prof.',mg+2,y+4,7,true); T(d.t2prof?d.t2prof+'m':'-',mg+2,y+9,9);
    T('Agua',mg+2,y+13,7,true); T(d.t2agua,mg+2,y+18,9,true,d.t2agua==='ICINCO'?verde:negro);
    L(mg+50,y,mg+50,y+hF2);
    T('PVC',mg+52,y+4,7,true); T(d.t2pvc,mg+52,y+9,9,true,d.t2pvc==='NO'?rojo:verde);
    T('Tapa',mg+52,y+13,7,true); T(d.t2tapa,mg+52,y+18,9,true,d.t2tapa==='NO'?rojo:verde);
    L(mg+100,y,mg+100,y+hF2);
    T('Ensayos de campo',mg+102,y+4,7,true);
    doc.setFontSize(8);doc.setFont('helvetica','normal');doc.setTextColor(...negro);
    doc.text(doc.splitTextToSize(d.t2ensayos||'-',fw-104),mg+102,y+9);
    y+=hF2;

    R(mg,y,fw,6,gris,negro); T('DETALLES DE SITUACIÓN',mg+3,y+4.3,8,true); y+=6;
    const hSit2=H-y-mg-8, ancQR2=50;
    R(mg,y,fw-ancQR2,hSit2,[230,230,230],negro);
    R(mg+fw-ancQR2,y,ancQR2,hSit2,blanco,negro);
    if(ultimaLat&&ultimaLon){
      try{const img=await capturarMapa();if(img)doc.addImage(img,'JPEG',mg+1,y+1,fw-ancQR2-2,hSit2-2);}catch(e){}
    }
    T('UBICACIÓN',mg+fw-ancQR2+ancQR2/2,y+hSit2-10,7,true,negro,'center');
    const mUrl2=ultimaLat?`maps.google.com/?q=${ultimaLat},${ultimaLon}`:'';
    doc.setFontSize(6);doc.setFont('helvetica','normal');doc.setTextColor(26,95,168);
    if(mUrl2){doc.text(doc.splitTextToSize(mUrl2,ancQR2-4),mg+fw-ancQR2+2,y+hSit2-4);}
  }

  // Footer
  const fechaFmt=d.fecha?new Date(d.fecha+'T00:00:00').toLocaleDateString('es-ES'):'';
  doc.setFontSize(6);doc.setFont('helvetica','normal');doc.setTextColor(150,150,150);
  doc.text(`ICINCO LABORATORIO · ${fechaFmt}`,mg,H-mg+4);
  doc.text(`Nº Obra: ${d.nObra} — ${d.nombre}`,W-mg,H-mg+4,{align:'right'});

  const safe=s=>s.replace(/[^a-zA-Z0-9_\-]/g,'_');
  doc.save(`Ficha_${safe(d.nObra||'')}_${safe(d.nombre||'')}_T${tipoActivo}.pdf`);
}

async function capturarMapa() {
  if (!ultimaLat || !ultimaLon) return null;
  const lat = ultimaLat, lon = ultimaLon;
  const zoom = 16;

  // Convertir lat/lon a coordenadas de tile
  function latLonToTile(lat, lon, z) {
    const x = Math.floor((lon + 180) / 360 * Math.pow(2, z));
    const y = Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z));
    return {x, y};
  }

  const tile = latLonToTile(lat, lon, zoom);
  const tileSize = 256;
  const cols = 3, rows = 2; // grid de tiles
  const offX = Math.floor(cols/2), offY = Math.floor(rows/2);

  const canvas = document.createElement('canvas');
  canvas.width = tileSize * cols;
  canvas.height = tileSize * rows;
  const ctx = canvas.getContext('2d');

  const promises = [];
  for (let dy = -offY; dy <= offY; dy++) {
    for (let dx = -offX; dx <= offX; dx++) {
      const tx = tile.x + dx, ty = tile.y + dy;
      const px = (dx + offX) * tileSize, py = (dy + offY) * tileSize;
      // Esri World Imagery - permite crossOrigin
      const url = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${ty}/${tx}`;
      promises.push(new Promise(res => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { ctx.drawImage(img, px, py, tileSize, tileSize); res(); };
        img.onerror = () => res();
        img.src = url;
      }));
    }
  }

  await Promise.all(promises);

  // Marcador en el centro
  const cx = canvas.width / 2, cy = canvas.height / 2;
  ctx.fillStyle = '#e74c3c';
  ctx.beginPath();
  ctx.arc(cx, cy - 4, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c0392b';
  ctx.beginPath();
  ctx.moveTo(cx - 6, cy - 4);
  ctx.lineTo(cx + 6, cy - 4);
  ctx.lineTo(cx, cy + 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(cx, cy - 4, 3, 0, Math.PI * 2);
  ctx.fill();

  return canvas.toDataURL('image/jpeg', 0.88);
}

// ── Limpiar ──
function limpiar() {
  document.querySelectorAll('input[type=text],input[type=number],textarea').forEach(e=>e.value='');
  document.getElementById('fecha').valueAsDate=new Date();
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('activo'));
  document.querySelectorAll('.toggle-btn.no').forEach(b=>b.classList.add('activo'));
  // reset toggles
  document.getElementById('agua').value='CLIENTE';
  document.getElementById('t2agua').value='CLIENTE';
  ['pvc','tapa','t2pvc','t2tapa'].forEach(id=>{
    const e=document.getElementById(id);if(e)e.value='NO';
  });
  if(leafletMap){leafletMap.remove();leafletMap=null;leafletMarker=null;}
  ultimaLat=null;ultimaLon=null;
  actualizarNotaMapa();
  preview();
}
